name: Scope Web CI

on:
  pull_request:
    paths:
      - ".github/scripts/deploy-railway.sh"
      - ".github/workflows/scope-web-ci.yml"
      - "web/**"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/deploy-railway.sh"
      - ".github/workflows/scope-web-ci.yml"
      - "web/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Check scope-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.0 --activate

      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-web-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-web-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy scope-web
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Stage Railway upload root
        shell: bash
        run: |
          rm -rf .railway-upload
          mkdir -p .railway-upload/web
          cp -a web/. .railway-upload/web/
          test -s .railway-upload/web/package.json
          test ! -e .railway-upload/package.json

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.23.1

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_DEPLOY_MESSAGE: ${{ github.event.head_commit.message || github.workflow }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: bash .github/scripts/deploy-railway.sh scope-web .railway-upload
