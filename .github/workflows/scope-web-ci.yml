name: Scope Web CI

on:
  pull_request:
    paths:
      - ".github/scripts/deploy-railway.sh"
      - ".github/workflows/scope-web-ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "api/**"
      - "crates/**"
      - "dev/**"
      - "web/**"
      - "worker/**"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/deploy-railway.sh"
      - ".github/workflows/scope-web-ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "api/**"
      - "crates/**"
      - "dev/**"
      - "web/**"
      - "worker/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Check scope-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.0 --activate

      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-web-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-web-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

  smoke:
    name: Browser smoke against seeded local stack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scope_dev
          POSTGRES_PASSWORD: scope
          POSTGRES_USER: scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scope -d scope_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.0

      - name: Cache Rust build outputs
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-web-smoke-cargo-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-web-smoke-cargo-${{ hashFiles('Cargo.lock') }}
            ${{ runner.os }}-web-smoke-cargo-

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.0 --activate

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      # Required repository secret: CLERK_DEVELOPMENT_PUBLISHABLE_KEY (pk_test_*).
      # These smoke routes are anonymous, so they do not use a Clerk secret key.
      - name: Configure isolated local stack
        env:
          CLERK_DEVELOPMENT_PUBLISHABLE_KEY: ${{ secrets.CLERK_DEVELOPMENT_PUBLISHABLE_KEY }}
        shell: bash
        run: |
          if [[ "$CLERK_DEVELOPMENT_PUBLISHABLE_KEY" != pk_test_* ]]; then
            echo "::error::Repository secret CLERK_DEVELOPMENT_PUBLISHABLE_KEY must contain a Clerk development publishable key (pk_test_*)."
            exit 1
          fi
          printf '%s\n' \
            'DATABASE_URL=postgres://scope:scope@127.0.0.1:5432/scope_dev' \
            'SCOPE_DEV_USER_EMAIL=smoke@example.test' \
            'SCOPE_DEV_USER_HANDLE=dev' > .env.local
          printf 'VITE_CLERK_PUBLISHABLE_KEY=%s\nCLERK_SECRET_KEY=sk_test_anonymous_smoke_not_used\n' \
            "$CLERK_DEVELOPMENT_PUBLISHABLE_KEY" > web/.env.local

      - name: Prebuild local API and worker
        run: cargo build -p api -p worker --features api/local-dev --locked

      - name: Start seeded local stack
        run: ./dev/scope-dev up

      - name: Run browser smoke
        working-directory: web
        env:
          SCOPE_SMOKE_REPO: dev/public-demo
          SCOPE_WEB_BASE_URL: http://localhost:3000
        run: pnpm test:smoke

      - name: Print local stack logs
        if: failure()
        shell: bash
        run: |
          for log in .tmp/local-dev/*.log; do
            [[ -f "$log" ]] || continue
            echo "::group::$log"
            tail -n 300 "$log"
            echo "::endgroup::"
          done

      - name: Stop local stack
        if: always()
        run: ./dev/scope-dev down

  deploy:
    name: Deploy scope-web
    needs: [checks, smoke]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Stage Railway upload root
        shell: bash
        run: |
          rm -rf .railway-upload
          mkdir -p .railway-upload/web
          cp -a web/. .railway-upload/web/
          test -s .railway-upload/web/package.json
          test ! -e .railway-upload/package.json

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.23.1

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_DEPLOY_MESSAGE: ${{ github.event.head_commit.message || github.workflow }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: bash .github/scripts/deploy-railway.sh scope-web .railway-upload
