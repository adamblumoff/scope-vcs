name: Scope Web CI

on:
  pull_request:
    paths:
      - ".github/workflows/scope-web-ci.yml"
      - "web/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/scope-web-ci.yml"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Check scope-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.0 --activate

      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-web-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-web-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check line limit
        run: pnpm check:line-limit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy scope-web
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Stage Railway upload root
        shell: bash
        run: |
          rm -rf .railway-upload
          mkdir -p .railway-upload
          cp -a web/. .railway-upload/
          mkdir -p .railway-upload/web
          cp -a web/. .railway-upload/web/

      - name: Require Railway configuration
        shell: bash
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Set the RAILWAY_TOKEN repository secret before deploying scope-web."
            exit 1
          fi

          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Set the RAILWAY_PROJECT_ID repository secret before deploying scope-web."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.23.1

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_DEPLOY_MESSAGE: ${{ github.event.head_commit.message || github.workflow }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          first_line="$(printf '%s\n' "$RAILWAY_DEPLOY_MESSAGE" | sed -n '1p')"
          pr_title="$(printf '%s\n' "$RAILWAY_DEPLOY_MESSAGE" | awk 'NR > 1 && NF { print; exit }')"

          if [[ "$first_line" =~ ^Merge\ pull\ request\ #[0-9]+ ]] && [ -n "$pr_title" ]; then
            deploy_message="$pr_title"
          else
            deploy_message="$first_line"
          fi

          if [ -z "$deploy_message" ]; then
            deploy_message="${GITHUB_WORKFLOW:-Scope Web CI}"
          fi

          railway up .railway-upload \
            --path-as-root \
            --no-gitignore \
            --project "$RAILWAY_PROJECT_ID" \
            --service scope-web \
            --environment production \
            --message "$deploy_message" \
            --json
