name: Rust Workspace Checks

on:
  workflow_call:
    inputs:
      include_api:
        default: false
        required: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCOPE_TEST_DATABASE_URL: postgres://scope:scope@127.0.0.1:5432/scope_test

jobs:
  checks:
    name: Check Rust workspace
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scope_test
          POSTGRES_PASSWORD: scope
          POSTGRES_USER: scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scope -d scope_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-rust-cargo-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-rust-cargo-${{ hashFiles('Cargo.lock') }}
            ${{ runner.os }}-rust-cargo-

      - name: Check Rust workspace
        shell: bash
        run: |
          packages=(-p scope-core -p worker)
          if [[ "${{ inputs.include_api }}" == "true" ]]; then
            packages+=(-p api)
            features=(--features api/test-support)
          else
            features=()
          fi
          cargo fmt --all --check
          cargo test "${packages[@]}" "${features[@]}" --locked -- --test-threads=4
          cargo clippy "${packages[@]}" "${features[@]}" --all-targets --locked -- -D warnings

      - name: Install Node
        if: inputs.include_api
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check API TypeScript contract
        if: inputs.include_api
        working-directory: web
        run: node scripts/check-api-contract.mjs
