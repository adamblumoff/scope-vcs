name: Scope CLI Build

on:
  pull_request:
    paths:
      - ".github/scripts/deploy-railway.sh"
      - ".github/workflows/scope-cli-build.yml"
      - "api/src/app.rs"
      - "api/src/http/responses.rs"
      - "api/src/http/routes.rs"
      - "api/src/http/type_exports.rs"
      - "cli/**"
      - "crates/scope-core/**"
      - "rust-toolchain.toml"
      - "web/src/api/types.generated.ts"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/deploy-railway.sh"
      - ".github/workflows/scope-cli-build.yml"
      - "api/src/app.rs"
      - "api/src/http/responses.rs"
      - "api/src/http/routes.rs"
      - "api/src/http/type_exports.rs"
      - "cli/**"
      - "crates/scope-core/**"
      - "rust-toolchain.toml"
      - "web/src/api/types.generated.ts"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare distribution matrix
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read distribution targets
        id: targets
        shell: bash
        run: |
          matrix="$(jq -c '{include: [.targets[] | {label, runner, target: .triple, artifact, binary, builder, smoke}]}' cli/distribution/targets.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  checks:
    name: Check scope-cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            cli/target
          key: ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
            ${{ runner.os }}-cli-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Test
        run: cargo test --manifest-path cli/Cargo.toml --locked

      - name: Lint
        run: cargo clippy --manifest-path cli/Cargo.toml --all-targets --locked -- -D warnings

      - name: Build release binaries
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: >
          cargo build
          --manifest-path cli/Cargo.toml
          --release
          --locked
          --bin scope
          --bin scope-cli-service

  build:
    name: Build ${{ matrix.label }}
    needs: [checks, prepare]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            cli/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cli/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cli/Cargo.lock') }}
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.builder == 'cross'
        working-directory: cli
        env:
          CARGO_TARGET_DIR: target/cargo-install
        run: cargo install cross --locked

      - name: Build scope
        working-directory: cli
        shell: bash
        run: |
          if [ "${{ matrix.builder }}" = "cross" ]; then
            cross build --release --locked --target "${{ matrix.target }}" --bin scope
          else
            cargo build --release --locked --target "${{ matrix.target }}" --bin scope
          fi

      - name: Smoke test
        if: matrix.smoke
        working-directory: cli
        shell: bash
        run: ./${{ matrix.binary }} --help

      - name: Stage artifact
        working-directory: cli
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: cli/dist/${{ matrix.artifact }}
          if-no-files-found: error

  deploy:
    name: Deploy scope-cli
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: cli/dist
          merge-multiple: true

      - name: Verify artifacts and write checksums
        shell: bash
        run: |
          mapfile -t expected < <(jq -r '.targets[].artifact' cli/distribution/targets.json)

          for artifact in "${expected[@]}"; do
            test -s "cli/dist/$artifact"
          done

          (
            cd cli/dist
            for artifact in "${expected[@]}"; do
              sha256sum "$artifact" > "$artifact.sha256"
            done
          )

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Stage Railway upload root
        shell: bash
        run: |
          rm -rf .railway-upload
          mkdir -p .railway-upload
          cp -a cli/. .railway-upload/
          cp rust-toolchain.toml .railway-upload/rust-toolchain.toml
          mkdir -p .railway-upload/crates
          cp -a crates/scope-core .railway-upload/crates/scope-core
          perl -0pi -e 's#path = "\.\./crates/scope-core"#path = "crates/scope-core"#' .railway-upload/Cargo.toml
          grep -F 'path = "crates/scope-core"' .railway-upload/Cargo.toml
          test -s .railway-upload/railpack.json
          test -s .railway-upload/crates/scope-core/Cargo.toml

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.23.1

      - name: Deploy artifacts to Railway
        shell: bash
        env:
          RAILWAY_DEPLOY_MESSAGE: ${{ github.event.head_commit.message || github.workflow }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: bash .github/scripts/deploy-railway.sh scope-cli .railway-upload
