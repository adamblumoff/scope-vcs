name: Scope API CI

on:
  pull_request:
    paths:
      - ".github/workflows/scope-api-ci.yml"
      - "api/**"
      - "web/scripts/check-api-contract.mjs"
      - "web/src/api/types.generated.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/scope-api-ci.yml"
      - "api/**"
      - "web/scripts/check-api-contract.mjs"
      - "web/src/api/types.generated.ts"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Check scope-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            api/target
          key: ${{ runner.os }}-api-cargo-${{ hashFiles('api/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-api-cargo-${{ hashFiles('api/Cargo.lock') }}
            ${{ runner.os }}-api-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path api/Cargo.toml -- --check

      - name: Test
        run: cargo test --manifest-path api/Cargo.toml --locked

      - name: Lint
        run: cargo clippy --manifest-path api/Cargo.toml --all-targets --locked -- -D warnings

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check API TypeScript contract
        working-directory: web
        run: node scripts/check-api-contract.mjs

  deploy:
    name: Deploy scope-api
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Stage Railway upload root
        shell: bash
        run: |
          rm -rf .railway-upload
          mkdir -p .railway-upload
          cp -a api/. .railway-upload/
          mkdir -p .railway-upload/api
          cp -a api/. .railway-upload/api/

      - name: Require Railway configuration
        shell: bash
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Set the RAILWAY_TOKEN repository secret before deploying scope-api."
            exit 1
          fi

          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Set the RAILWAY_PROJECT_ID repository secret before deploying scope-api."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.23.1

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_DEPLOY_MESSAGE: ${{ github.event.head_commit.message || github.workflow }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          first_line="$(printf '%s\n' "$RAILWAY_DEPLOY_MESSAGE" | sed -n '1p')"
          pr_title="$(printf '%s\n' "$RAILWAY_DEPLOY_MESSAGE" | awk 'NR > 1 && NF { print; exit }')"

          if [[ "$first_line" =~ ^Merge\ pull\ request\ #[0-9]+ ]] && [ -n "$pr_title" ]; then
            deploy_message="$pr_title"
          else
            deploy_message="$first_line"
          fi

          if [ -z "$deploy_message" ]; then
            deploy_message="${GITHUB_WORKFLOW:-Scope API CI}"
          fi

          wait_for_deployment() {
            local service_name="$1"
            local message="$2"
            local started_at="$3"
            local deadline=$((SECONDS + 900))

            while true; do
              if deployment_json="$(
                railway deployment list \
                  --project "$RAILWAY_PROJECT_ID" \
                  --service "$service_name" \
                  --environment production \
                  --limit 10 \
                  --json
              )"; then
                deployment_line="$(
                  DEPLOYMENTS_JSON="$deployment_json" \
                  DEPLOY_MESSAGE="$message" \
                  DEPLOY_STARTED_AT="$started_at" \
                  node -e 'const deployments = JSON.parse(process.env.DEPLOYMENTS_JSON || "[]"); const message = process.env.DEPLOY_MESSAGE || ""; const startedAt = Date.parse(process.env.DEPLOY_STARTED_AT || "1970-01-01T00:00:00Z") - 30000; const deployment = deployments.find((candidate) => { const createdAt = Date.parse(candidate.createdAt || ""); return candidate.meta?.cliMessage === message && Number.isFinite(createdAt) && createdAt >= startedAt; }); if (deployment) console.log([deployment.id, deployment.status, deployment.meta?.skippedReason || ""].join("\t"));'
                )"

                if [ -n "$deployment_line" ]; then
                  IFS=$'\t' read -r deployment_id deployment_status skipped_reason <<< "$deployment_line"
                  echo "Railway deployment $deployment_id is $deployment_status."

                  case "$deployment_status" in
                    SUCCESS)
                      return 0
                      ;;
                    SKIPPED)
                      echo "Railway skipped deployment: ${skipped_reason:-no reason provided}."
                      return 0
                      ;;
                    FAILED|CRASHED|REMOVED)
                      return 1
                      ;;
                  esac
                else
                  echo "Waiting for Railway deployment to appear..."
                fi
              else
                echo "Waiting for Railway deployment status..."
              fi

              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "Timed out waiting for Railway deployment."
                return 1
              fi

              sleep 10
            done
          }

          deploy_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          railway up .railway-upload \
            --path-as-root \
            --no-gitignore \
            --project "$RAILWAY_PROJECT_ID" \
            --service scope-api \
            --environment production \
            --message "$deploy_message" \
            --detach \
            --json

          wait_for_deployment "scope-api" "$deploy_message" "$deploy_started_at"
